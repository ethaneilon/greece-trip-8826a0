<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
    min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px;
    background:radial-gradient(circle at 30% 0%, #15506F 0%, #0E3A57 55%, #07212F 100%);color:#fff;}
  .card{width:100%;max-width:360px;text-align:center;}
  .lock{width:62px;height:62px;border-radius:50%;margin:0 auto 22px;display:flex;align-items:center;justify-content:center;
    background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);}
  .kick{font-size:11px;font-weight:700;letter-spacing:2.4px;text-transform:uppercase;color:#E2C07C;}
  h1{font-family:Georgia,'Times New Roman',serif;font-weight:500;font-size:40px;line-height:1;margin:8px 0 6px;letter-spacing:-.5px;}
  .sub{font-size:13.5px;color:rgba(255,255,255,.7);margin-bottom:26px;}
  form{display:flex;flex-direction:column;gap:12px;}
  input[type=password]{font:inherit;font-size:16px;text-align:center;letter-spacing:.5px;color:#0F3450;
    background:#FAF8F3;border:none;border-radius:14px;padding:15px 16px;outline:none;}
  button{font:inherit;font-size:15px;font-weight:600;color:#3A2C12;cursor:pointer;border:none;border-radius:14px;
    padding:15px 16px;background:linear-gradient(135deg,#E2C07C,#C9A45C);box-shadow:0 8px 22px -10px rgba(201,164,92,.7);}
  button:active{transform:scale(.99);}
  .remember{display:flex;align-items:center;justify-content:center;gap:8px;font-size:13px;color:rgba(255,255,255,.72);margin-top:2px;}
  .remember input{width:16px;height:16px;accent-color:#E2C07C;}
  .err{min-height:18px;font-size:13px;color:#F3B0A6;margin-top:4px;opacity:0;transition:opacity .2s;}
  .err.show{opacity:1;}
  .foot{margin-top:22px;font-size:11.5px;color:rgba(255,255,255,.45);line-height:1.5;}
  @keyframes shake{10%,90%{transform:translateX(-2px);}20%,80%{transform:translateX(4px);}30%,50%,70%{transform:translateX(-7px);}40%,60%{transform:translateX(7px);}}
  .shake{animation:shake .4s;}

function b2u(b64){var bin=atob(b64),a=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return a;}
var SALT=b2u(SALT_B64), IV=b2u(IV_B64), CT=b2u(CT_B64);
function deriveKey(pw){
  var enc=new TextEncoder();
  return crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]).then(function(base){
    return crypto.subtle.deriveKey({name:"PBKDF2",salt:SALT,iterations:200000,hash:"SHA-256"},base,{name:"AES-GCM",length:256},false,["decrypt"]);
  });
}
function decrypt(pw){
  return deriveKey(pw).then(function(key){
    return crypto.subtle.decrypt({name:"AES-GCM",iv:IV},key,CT);
  }).then(function(buf){ return new TextDecoder().decode(buf); });
}
function reveal(html){ document.open(); document.write(html); document.close(); }
function fail(){
  var err=document.getElementById("err"), card=document.getElementById("card"), pw=document.getElementById("pw");
  if(err) err.classList.add("show");
  if(card){ card.classList.remove("shake"); void card.offsetWidth; card.classList.add("shake"); }
  if(pw){ pw.value=""; pw.focus(); }
  try{ localStorage.removeItem("greece_pw"); sessionStorage.removeItem("greece_pw"); }catch(e){}
}
function attempt(pw, remember){
  return decrypt(pw).then(function(html){
    try{ sessionStorage.setItem("greece_pw",pw); if(remember) localStorage.setItem("greece_pw",pw); }catch(e){}
    reveal(html);
  });
}
document.getElementById("f").addEventListener("submit",function(e){
  e.preventDefault();
  var pw=document.getElementById("pw").value;
  var remember=document.getElementById("remember").checked;
  document.getElementById("err").classList.remove("show");
  attempt(pw, remember).catch(fail);
});
// auto-unlock if remembered on this device
(function(){
  var saved=null; try{ saved=localStorage.getItem("greece_pw")||sessionStorage.getItem("greece_pw"); }catch(e){}
  if(saved){ decrypt(saved).then(reveal).catch(function(){ try{localStorage.removeItem("greece_pw");sessionStorage.removeItem("greece_pw");}catch(e){} }); }
  else { var p=document.getElementById("pw"); if(p) p.focus(); }
})();
