<!DOCTYPE html>
<html lang="en">
<head>
<meta name="robots" content="noindex, nofollow">
<meta charset="utf-8">
<title>Greece · Jul 2026</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Greece">
<meta name="theme-color" content="#0F3450">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230F3450'/%3E%3Crect x='36' y='20' width='28' height='60' rx='6' fill='%23FAF8F3'/%3E%3Ctext x='50' y='57' font-family='Georgia,serif' font-size='15' fill='%23B5894B' text-anchor='middle'%3EGR%3C/text%3E%3C/svg%3E">
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  ::-webkit-scrollbar{width:0;height:0;display:none;}

  :root{
    --serif:Georgia,'Times New Roman',serif;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
    --mono:ui-monospace,Menlo,monospace;
    --bg:#FAF8F3; --surface:#FFFFFF; --surface-2:#FFFCF5;
    --border:#ECE6DA; --divider:#F2EDE2; --rule:#E2DCCD;
    --navy:#0F3450; --navy-2:#13577E; --ink:#1C2A35;
    --gold:#B5894B; --gold-2:#C9A45C; --gold-soft:#E2C07C; --gold-line:#D7B36A;
    --muted:#7A8893; --muted-2:#9DAAB4; --muted-3:#8593A0; --slate:#54616C;
    --advisory-bg:#FBF1DD; --advisory-bd:#F0DEB6; --advisory-h:#B07F25; --advisory-t:#7C6534;
    --green:#3E7C5F; --green-bg:#E9F2EC;
    --hero:linear-gradient(150deg,#2C84B4 0%,#13577E 52%,#0E3A57 100%);
    --hero-fade:linear-gradient(to bottom,rgba(12,42,64,.25) 0%,rgba(12,42,64,0) 32%,rgba(10,32,48,.5) 60%,rgba(8,24,38,.93) 100%);
    --time:#13577E;
    --tab-bg:rgba(250,248,243,.93); --tab-bd:#E7E0D2;
    --shadow:0 1px 2px rgba(15,52,80,.04);
    --frame:#11212c; --frame-2:#33414c;
    --page-bg:radial-gradient(circle at 30% 0%, #EEEAE0 0%, #E2DDD2 70%);
  }
  [data-theme="dark"]{
    --bg:#0A1B28; --surface:#10293A; --surface-2:#142F42;
    --border:rgba(255,255,255,.08); --divider:rgba(255,255,255,.07); --rule:rgba(255,255,255,.1);
    --navy:#EAF0F4; --navy-2:#6FB1DC; --ink:#EAF0F4;
    --gold:#E2C07C; --gold-2:#E2C07C; --gold-soft:#E2C07C; --gold-line:rgba(226,192,124,.5);
    --muted:#8FA3B3; --muted-2:#6E8092; --muted-3:#8FA3B3; --slate:#A9BBC8;
    --advisory-bg:rgba(226,192,124,.1); --advisory-bd:rgba(226,192,124,.28); --advisory-h:#E2C07C; --advisory-t:#D8C495;
    --green:#7FCBA3; --green-bg:rgba(127,203,163,.14);
    --hero:linear-gradient(150deg,#15506F 0%,#0C3A55 52%,#07212F 100%);
    --hero-fade:linear-gradient(to bottom,rgba(6,16,24,.4) 0%,rgba(6,16,24,.05) 34%,rgba(6,16,24,.6) 60%,rgba(4,12,20,.96) 100%);
    --time:#6FB1DC;
    --tab-bg:rgba(10,27,40,.92); --tab-bd:rgba(255,255,255,.08);
    --shadow:0 1px 2px rgba(0,0,0,.25);
    --frame:#06121b; --frame-2:#1d2a34;
    --page-bg:#06121b;
  }

  body{background:var(--page-bg);font-family:var(--sans);transition:background .3s;}
  @keyframes gPulse{0%,100%{opacity:1;}50%{opacity:.4;}}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

  /* Natural-scroll shell: works hosted in any browser & as an installed PWA */
  .stage{min-height:100dvh;background:var(--bg);}
  .app{position:relative;width:100%;max-width:460px;margin:0 auto;background:var(--bg);min-height:100dvh;transition:background .3s;}

  .screen{padding-bottom:calc(94px + env(safe-area-inset-bottom));animation:fade .28s ease;}

  /* floating theme toggle (replaces the fake status bar) */
  .themetoggle{position:fixed;top:calc(10px + env(safe-area-inset-top));z-index:30;width:38px;height:38px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;
    left:50%;transform:translateX(192px);
    background:rgba(255,255,255,.72);border:1px solid rgba(0,0,0,.06);color:var(--navy);box-shadow:0 1px 6px rgba(0,0,0,.14);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);}
  [data-theme="dark"] .themetoggle{background:rgba(16,41,58,.72);border-color:rgba(255,255,255,.14);color:#E2C07C;}
  @media(max-width:459px){ .themetoggle{left:auto;right:12px;transform:none;} }
  .statusbar{height:env(safe-area-inset-top);}
  .statusbar.onhero{height:env(safe-area-inset-top);}

  h1.title{font-family:var(--serif);font-weight:500;color:var(--navy);margin:0;letter-spacing:-.5px;}
  .kicker{font-size:11px;font-weight:700;letter-spacing:2.4px;text-transform:uppercase;color:var(--gold);}
  .eyebrow{font-size:11px;font-weight:700;letter-spacing:1.6px;text-transform:uppercase;color:var(--muted-2);}
  .sect{font-size:12px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--gold);}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);}
  .pad16{padding:0 16px;}
  .row{display:flex;}

  /* day list cards */
  .daycard{width:100%;text-align:left;background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:15px 16px;cursor:pointer;font:inherit;display:flex;gap:15px;align-items:center;margin-bottom:11px;box-shadow:var(--shadow);transition:transform .12s, box-shadow .12s;}
  .daycard:active{transform:scale(.985);}
  .daycard.today{background:linear-gradient(160deg,var(--surface-2),var(--surface));border:1.5px solid var(--gold-line);box-shadow:0 10px 24px -12px rgba(181,137,75,.45);}
  .dnum{flex:0 0 38px;text-align:center;}
  .dnum b{font-family:var(--serif);font-size:27px;line-height:1;color:var(--navy);font-weight:500;display:block;}
  .dnum.gold b{color:var(--gold);}
  .dnum span{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted-2);margin-top:3px;display:block;}
  .vline{width:1px;align-self:stretch;background:var(--divider);}
  .dmeta{flex:1;min-width:0;}
  .dmeta .dow{font-size:11.5px;font-weight:600;letter-spacing:.4px;color:var(--muted-3);text-transform:uppercase;}
  .dmeta .dttl{font-family:var(--serif);font-size:18px;color:var(--ink);margin:2px 0 4px;}
  .dmeta .dsum{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--muted);}
  .dot{width:5px;height:5px;border-radius:50%;background:var(--gold-2);flex:0 0 auto;}
  .grouphead{padding:18px 22px 6px;display:flex;align-items:center;gap:10px;}
  .grouphead .g1{font-size:11px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--gold);}
  .grouphead .g2{font-size:11px;color:var(--muted-2);}
  .grouphead .gl{flex:1;height:1px;background:var(--rule);}

  /* hero */
  .hero{position:relative;height:268px;background:var(--hero);overflow:hidden;}
  .hero.short{height:236px;}
  .hero .stripes{position:absolute;inset:0;background-image:repeating-linear-gradient(135deg,rgba(255,255,255,.05) 0 2px,transparent 2px 17px);}
  .hero .scene{position:absolute;inset:0;width:100%;height:100%;}
  .hero .scenetint{position:absolute;inset:0;background:transparent;}
  [data-theme="dark"] .hero .scenetint{background:rgba(6,16,24,.34);}
  .hero .fade{position:absolute;inset:0;background:var(--hero-fade);}
  .backbtn{position:absolute;top:calc(48px + env(safe-area-inset-top));left:18px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.16);backdrop-filter:blur(8px);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:4;}
  .herocap{position:absolute;left:24px;right:24px;bottom:20px;text-shadow:0 1px 14px rgba(0,0,0,.45),0 1px 3px rgba(0,0,0,.3);}
  .herocap .hk{font-size:11px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--gold-soft);}
  .herocap h1{font-family:var(--serif);font-size:33px;line-height:1.08;font-weight:500;color:#fff;margin:6px 0 0;}
  .herocap .hl{display:flex;align-items:center;gap:7px;margin-top:9px;font-size:13px;color:rgba(255,255,255,.85);}

  .advisory{margin:16px 20px 0;display:flex;gap:10px;background:var(--advisory-bg);border:1px solid var(--advisory-bd);border-radius:14px;padding:13px 15px;align-items:flex-start;}
  .advisory .t{font-size:13px;color:var(--advisory-t);line-height:1.45;}
  .sunsetline{margin:12px 20px 0;display:flex;align-items:center;gap:9px;font-size:13px;color:var(--muted);}
  .sunsetline b{display:inline-flex;align-items:center;gap:6px;font-weight:600;color:var(--gold);}

  /* timeline */
  .tl-item{display:flex;gap:14px;padding:15px 0;border-bottom:1px solid var(--divider);}
  .tl-item:last-child{border-bottom:none;}
  .tl-time{flex:0 0 62px;font-family:var(--mono);font-size:12px;font-weight:600;color:var(--time);letter-spacing:-.2px;text-align:right;padding-top:2px;}
  .tl-body{flex:1;min-width:0;}
  .tl-title{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .tl-title .nm{font-size:15.5px;font-weight:600;color:var(--ink);line-height:1.3;}
  .tl-note{margin-top:5px;font-size:13px;line-height:1.5;color:var(--muted);}
  .badge{display:inline-flex;align-items:center;gap:3px;font-size:9.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--green);background:var(--green-bg);padding:2px 7px;border-radius:20px;}
  .chips{margin-top:10px;display:flex;flex-wrap:wrap;gap:8px;}
  .chip{display:inline-flex;align-items:center;gap:6px;font:inherit;font-size:12px;font-weight:600;text-decoration:none;padding:8px 12px;border-radius:11px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--navy-2);}
  .chip.gold{color:var(--gold);background:var(--advisory-bg);border-color:var(--advisory-bd);}
  .chip svg{flex:0 0 auto;}
  .conf{font-family:var(--mono);font-size:11px;color:var(--muted-2);}

  /* today */
  .upnext{background:linear-gradient(150deg,#13577E,#0F3450);border-radius:22px;padding:20px;box-shadow:0 18px 36px -16px rgba(15,52,80,.6);}
  [data-theme="dark"] .upnext{background:linear-gradient(150deg,#15506F,#07212F);border:1px solid rgba(255,255,255,.06);}
  .upnext .un-top{display:flex;align-items:baseline;justify-content:space-between;}
  .upnext .un-time{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--gold-soft);letter-spacing:.5px;}
  .upnext .un-tag{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:#9FD0EC;background:rgba(255,255,255,.1);padding:3px 9px;border-radius:20px;}
  .upnext h3{font-family:var(--serif);font-size:23px;color:#fff;margin:8px 0 3px;line-height:1.15;font-weight:500;}
  .upnext .un-note{font-size:13px;color:#B9CEDD;line-height:1.5;}
  .un-actions{display:flex;gap:9px;margin-top:16px;}
  .un-actions .primary{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;background:var(--gold-soft);border:none;border-radius:12px;padding:12px;cursor:pointer;font:inherit;font-size:13.5px;font-weight:600;color:#3A2C12;text-decoration:none;}
  .un-actions .icobtn{flex:0 0 auto;display:flex;align-items:center;justify-content:center;width:48px;background:rgba(255,255,255,.12);border-radius:12px;text-decoration:none;border:none;cursor:pointer;}
  .countdown{margin:18px 20px 0;background:var(--advisory-bg);border:1px solid var(--advisory-bd);border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:12px;}
  .countdown .big{font-family:var(--serif);font-size:30px;color:var(--gold);line-height:1;}
  .twocol{display:flex;gap:10px;margin:14px 20px 0;}
  .minicard{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 13px;}
  .minicard .lbl{font-size:10.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted-2);}
  .minicard .big{font-family:var(--serif);font-size:22px;color:var(--navy);margin-top:3px;}
  .ghostbtn{margin:14px 20px 0;width:calc(100% - 40px);display:flex;align-items:center;justify-content:center;gap:7px;background:var(--surface);border:1px solid var(--rule);border-radius:14px;padding:13px;cursor:pointer;font:inherit;font-size:13.5px;font-weight:600;color:var(--navy-2);}

  /* stat strip */
  .stats{margin:18px 24px 0;display:flex;background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:var(--shadow);}
  .stats .s{flex:1;padding:13px 8px;text-align:center;border-right:1px solid var(--divider);}
  .stats .s:last-child{border-right:none;}
  .stats .s b{font-family:var(--serif);font-size:22px;color:var(--navy);display:block;font-weight:500;}
  .stats .s.gold b{color:var(--gold);}
  .stats .s span{font-size:10px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted-2);margin-top:1px;display:block;}
  .todaybtn{margin:14px 24px 0;width:calc(100% - 48px);display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,#C9A45C,#B5894B);border:none;border-radius:14px;padding:13px 16px;cursor:pointer;font:inherit;box-shadow:0 6px 16px -6px rgba(181,137,75,.6);}
  .todaybtn .pulse{width:8px;height:8px;border-radius:50%;background:#fff;animation:gPulse 2s ease-in-out infinite;}
  .todaybtn .lbl{flex:1;text-align:left;color:#fff;font-size:14px;font-weight:600;}
  .todaybtn .sub{color:rgba(255,255,255,.85);font-size:12px;}

  /* bookings / info */
  .grouptitle{padding:22px 24px 6px;display:flex;align-items:center;gap:9px;}
  .grouptitle span{font-size:12px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--gold);}
  .bk{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:16px 17px;margin-bottom:11px;box-shadow:var(--shadow);}
  .bk .bk-top{display:flex;justify-content:space-between;align-items:center;}
  .bk .seg{font-size:12px;font-weight:600;color:var(--muted-3);letter-spacing:.3px;}
  .pill{font-size:10.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:2px 8px;border-radius:20px;}
  .pill.b{color:var(--green);background:var(--green-bg);}
  .pill.e{color:var(--muted-3);background:rgba(133,147,160,.14);}
  .route{display:flex;align-items:center;gap:12px;margin:11px 0 9px;}
  .route .iata{font-family:var(--serif);font-size:25px;color:var(--navy);}
  .bk .det{display:flex;justify-content:space-between;align-items:baseline;border-top:1px solid var(--divider);padding-top:10px;font-size:12.5px;color:var(--muted);}
  .bk .ref{font-family:var(--mono);font-size:11px;color:var(--muted-2);margin-top:6px;}
  .bk .stayname{font-family:var(--serif);font-size:17px;color:var(--ink);}
  .bk .staysub{font-size:12.5px;color:var(--muted);margin-top:2px;}
  .listcard{margin:0 16px;background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:var(--shadow);}
  .lrow{display:flex;align-items:center;gap:13px;padding:13px 16px;border-bottom:1px solid var(--divider);text-decoration:none;}
  .lrow:last-child{border-bottom:none;}
  .lrow .lr-main{flex:1;min-width:0;}
  .lrow .lr-t{font-size:14px;font-weight:600;color:var(--ink);}
  .lrow .lr-s{font-size:12px;color:var(--muted);margin-top:1px;}
  .lrow .lr-ref{font-family:var(--mono);font-size:11px;color:var(--muted-2);}

  .emergency{margin:20px 16px 0;background:linear-gradient(150deg,#B0463A,#8E372E);border-radius:18px;padding:16px 18px;box-shadow:0 12px 26px -14px rgba(142,55,46,.7);}
  .emergency .eh{font-size:11px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:rgba(255,255,255,.8);}
  .emergency .erow{display:flex;gap:10px;margin-top:11px;}
  .emergency a{flex:1;text-decoration:none;background:rgba(255,255,255,.14);border-radius:12px;padding:11px;text-align:center;}
  .emergency a b{font-family:var(--serif);font-size:24px;color:#fff;display:block;font-weight:500;}
  .emergency a span{font-size:11px;color:rgba(255,255,255,.82);margin-top:1px;display:block;}
  .stay{border-radius:16px;padding:14px 16px;margin-bottom:10px;background:var(--surface);border:1px solid var(--border);}
  .stay.now{background:var(--surface-2);border:1.5px solid var(--gold-line);}
  .stay .sname{font-family:var(--serif);font-size:16px;color:var(--ink);}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px;}
  .infocell{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:13px 14px;}
  .infocell .lbl{font-size:11px;color:var(--muted-2);}
  .infocell .val{font-size:14px;font-weight:600;color:var(--ink);margin-top:2px;}

  /* place detail */
  .pchips{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px 16px 0;}
  .pchips .infocell .lbl{color:var(--muted-2);}
  .pbox{margin:14px 16px 0;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:15px 17px;}
  .pbox .lbl{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted-2);}
  .pbox.bring{background:var(--advisory-bg);border-color:var(--advisory-bd);}
  .pbox.bring .lbl{color:var(--advisory-h);}
  .bringitem{display:flex;align-items:center;gap:9px;font-size:13.5px;color:var(--advisory-t);}
  .mapbtn{margin:14px 16px 0;display:flex;align-items:center;justify-content:center;gap:8px;height:130px;border-radius:16px;background:linear-gradient(135deg,#DCE6EC,#C8D6DF);position:relative;overflow:hidden;border:1px solid #C3D1DA;text-decoration:none;}
  [data-theme="dark"] .mapbtn{background:linear-gradient(135deg,#1b3344,#16293a);border-color:rgba(255,255,255,.1);}
  .mapbtn .stripes{position:absolute;inset:0;background-image:repeating-linear-gradient(135deg,rgba(255,255,255,.4) 0 2px,transparent 2px 15px);}
  [data-theme="dark"] .mapbtn .stripes{background-image:repeating-linear-gradient(135deg,rgba(255,255,255,.06) 0 2px,transparent 2px 15px);}
  .mapbtn .lab{position:relative;display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;letter-spacing:.4px;color:#3A5663;background:rgba(255,255,255,.82);padding:8px 13px;border-radius:20px;font-weight:600;}
  [data-theme="dark"] .mapbtn .lab{color:#cfe0ea;background:rgba(8,20,30,.6);}
  .twobtns{display:flex;gap:10px;margin:16px 16px 0;}
  .twobtns a{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;border-radius:13px;padding:14px;text-decoration:none;font-size:14px;font-weight:600;}
  .twobtns a.solid{background:var(--navy-2);color:#fff;}
  .twobtns a.outline{background:var(--surface);border:1px solid var(--rule);color:var(--navy-2);}

  /* tab bar */
  .tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:460px;background:var(--tab-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--tab-bd);display:flex;padding:10px 10px calc(10px + env(safe-area-inset-bottom));z-index:25;}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;background:none;border:none;cursor:pointer;font:inherit;color:var(--muted-2);}
  .tab.active{color:var(--gold);}
  .tab span{font-size:10px;font-weight:600;letter-spacing:.2px;}
</style>
</head>
<body>
<div class="stage">
  <div class="app" id="app">
    <button class="themetoggle" id="themetoggle" onclick="toggleTheme()" aria-label="Toggle light/dark"></button>
    <div class="screen" id="screen"></div>
    <nav class="tabbar" id="tabbar"></nav>
  </div>
</div>

<script>
"use strict";

/* ---------- platform-aware maps + tel helpers ---------- */
var IS_APPLE = /iPad|iPhone|iPod|Macintosh|Mac OS X/.test(navigator.userAgent);
function mapsUrl(q){
  var e = encodeURIComponent(q);
  return IS_APPLE ? "https://maps.apple.com/?q=" + e
                  : "https://www.google.com/maps/search/?api=1&query=" + e;

/* ---------- safe storage (localStorage can throw on local files / private mode) ---------- */
function lsGet(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
function lsSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }

} catch(e){}
var theme = lsGet("greece_theme") || "light";
try { document.documentElement.setAttribute("data-theme", theme); } catch(e){}

function save(){ lsSet("greece_state", JSON.stringify({screen:state.screen, day:state.day})); }
function go(screen, opts){ state.screen=screen; if(opts&&opts.day!=null)state.day=opts.day; if(opts&&opts.place)state.place=opts.place; save(); render(); var sc=document.getElementById("screen"); if(sc) sc.scrollTop=0; }
function toggleTheme(){ theme = theme==="dark"?"light":"dark"; document.documentElement.setAttribute("data-theme",theme); lsSet("greece_theme",theme); render(); }
window.go=go; window.toggleTheme=toggleTheme;

/* ---------- today logic ---------- */
function dayByN(n){ for(var i=0;i<DAYS.length;i++){ if(DAYS[i].n===n) return DAYS[i]; } return DAYS[0]; }
function todayInfo(){
  var now = new Date();
  var start = new Date(TRIP.year, TRIP.month, TRIP.startDate);
  var end = new Date(TRIP.year, TRIP.month, TRIP.endDate, 23, 59);
  var t0 = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  if (now < start){
    var diff = Math.round((start - t0)/86400000);
    return { state:"before", day:0, daysAway:diff };
  }
  if (now > end){ return { state:"after", day:9 }; }
  // within trip
  for (var i=0;i<DAYS.length;i++){
    var d = new Date(TRIP.year, TRIP.month, DAYS[i].dateNum);
    if (t0.getTime() === d.getTime()) return { state:"during", day:DAYS[i].n };
  }
  return { state:"during", day:0 };
}

function actionChips(it){
  var out="";
  if (it.placeId){
    out += '<button class="chip gold" onclick="go(\'place\',{place:\''+it.placeId+'\'})">View booking'+(it.conf?' · '+esc(it.conf):'')+' '+I.chevronSm+'</button>';

    out += '<span class="chip" style="cursor:default">'+I.check.replace('width="9" height="9"','width="11" height="11"')+' '+esc(it.conf)+'</span>';
  }
  if (it.map){ out += '<a class="chip" target="_blank" rel="noopener" href="'+mapsUrl(it.map)+'">'+I.pinSm+' Directions</a>'; }
  if (it.phone){ out += '<a class="chip" href="'+telHref(it.phone)+'">'+I.phone+' Call</a>'; }
  return out ? '<div class="chips">'+out+'</div>' : "";
}

  return html;
}

      + '<div class="staysub" style="margin-top:3px;">'+esc(s.sub)+'</div>'

  DINING.forEach(function(r){

  // live weather (today's city) — fetched on load, graceful offline fallback
  html += '<div class="grouptitle"><span>Today’s Weather</span></div><div class="pad16">'
    + '<div class="card" style="padding:15px 17px;display:flex;align-items:center;gap:15px;">'

    + '<div style="flex:1;min-width:0;"><div style="display:flex;align-items:baseline;gap:8px;"><span id="wxTemp" style="font-family:var(--serif);font-size:30px;color:var(--navy);line-height:1;">—</span><span id="wxCity" style="font-size:13px;color:var(--muted);"></span></div>'
    + '<div id="wxCond" style="font-size:13px;color:var(--muted);margin-top:3px;">Loading…</div></div>'
    + '</div></div>';

  // euro <-> dollar converter (live ECB rate via Frankfurter, cached)
  html += '<div class="grouptitle"><span>Euro ⇄ Dollar</span></div><div class="pad16">'
    + '<div class="card" style="padding:15px 17px;">'
    + '<div style="display:flex;align-items:flex-end;gap:10px;">'
    + '<div style="flex:1;"><div style="font-size:11px;color:var(--muted-2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px;">Euro €</div>'
    + '<input id="cvEur" type="text" inputmode="decimal" value="1" oninput="convFrom(\'eur\')" style="width:100%;font:inherit;font-size:18px;font-weight:600;color:var(--ink);background:var(--bg);border:1px solid var(--border);border-radius:11px;padding:10px 12px;"></div>'
    + '<div style="flex:0 0 auto;color:var(--gold-2);padding-bottom:10px;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 8h13l-3-3M17 16H4l3 3"/></svg></div>'
    + '<div style="flex:1;"><div style="font-size:11px;color:var(--muted-2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px;">Dollar $</div>'
    + '<input id="cvUsd" type="text" inputmode="decimal" oninput="convFrom(\'usd\')" style="width:100%;font:inherit;font-size:18px;font-weight:600;color:var(--ink);background:var(--bg);border:1px solid var(--border);border-radius:11px;padding:10px 12px;"></div>'
    + '</div><div id="cvRate" style="font-size:12px;color:var(--muted);margin-top:11px;">Loading rate…</div>'

    + '<div class="infocell"><div class="lbl">Currency</div><div class="val">Euro · €</div></div>'
    + '<div class="infocell"><div class="lbl">Power</div><div class="val">Type C/F · 230V</div></div>'
    + '<div class="infocell"><div class="lbl">Tipping</div><div class="val">~5–10%</div></div>'
    + '<div class="infocell"><div class="lbl">Water</div><div class="val">Bottled on islands</div></div>'

/* ---------- live widgets: weather + currency (Essentials) ---------- */
var WX_CITY = {
  Athens:    { name:"Athens",    lat:37.9838, lon:23.7275 },
  Santorini: { name:"Santorini", lat:36.4072, lon:25.4566 },
  Mykonos:   { name:"Mykonos",   lat:37.4467, lon:25.3289 }
};
function weatherCityForToday(){
  var ti = todayInfo();
  if (ti.state === "during"){
    var c = dayByN(ti.day).city;
    if (c === "Departure") c = "Athens";
    return WX_CITY[c] || WX_CITY.Athens;
  }
  return WX_CITY.Athens;
}
function wmo(code){
  if (code===0) return {label:"Clear sky", kind:"clear"};
  if (code===1||code===2) return {label:"Partly cloudy", kind:"pcloud"};
  if (code===3) return {label:"Overcast", kind:"cloud"};
  if (code===45||code===48) return {label:"Fog", kind:"fog"};
  if (code>=51&&code<=57) return {label:"Drizzle", kind:"rain"};
  if (code>=61&&code<=67) return {label:"Rain", kind:"rain"};
  if (code>=71&&code<=77) return {label:"Snow", kind:"snow"};
  if (code>=80&&code<=82) return {label:"Showers", kind:"rain"};
  if (code>=95) return {label:"Thunderstorm", kind:"storm"};
  return {label:"—", kind:"clear"};
}
function wxGlyph(kind){
  var g='<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">';
  if (kind==="clear") return g+'<circle cx="12" cy="12" r="4.2"/><path d="M12 2.5v2.4M12 19.1v2.4M2.5 12h2.4M19.1 12h2.4M5.2 5.2l1.7 1.7M17.1 17.1l1.7 1.7M18.8 5.2l-1.7 1.7M6.9 17.1l-1.7 1.7"/></svg>';
  if (kind==="pcloud") return g+'<circle cx="8" cy="8" r="3"/><path d="M9 5.5l1.2 1.2M5 4v1.7M4 9H2.3"/><path d="M8 19h9a3.5 3.5 0 0 0 .3-7A5 5 0 0 0 8 13" /></svg>';
  if (kind==="cloud") return g+'<path d="M7 18h10a3.5 3.5 0 0 0 .3-7A5.2 5.2 0 0 0 7 12a3 3 0 0 0 0 6z"/></svg>';
  if (kind==="rain") return g+'<path d="M7 15h10a3.5 3.5 0 0 0 .3-7A5.2 5.2 0 0 0 7 9a3 3 0 0 0 0 6z"/><path d="M8 18l-1 2M12 18l-1 2M16 18l-1 2"/></svg>';
  if (kind==="storm") return g+'<path d="M7 14h10a3.5 3.5 0 0 0 .3-7A5.2 5.2 0 0 0 7 8a3 3 0 0 0 0 6z"/><path d="M12 16l-2 3h3l-2 3"/></svg>';
  if (kind==="snow") return g+'<path d="M7 14h10a3.5 3.5 0 0 0 .3-7A5.2 5.2 0 0 0 7 8a3 3 0 0 0 0 6z"/><path d="M9 18h.01M12 19h.01M15 18h.01"/></svg>';
  if (kind==="fog") return g+'<path d="M4 9h13a3 3 0 0 0 0-6 4.5 4.5 0 0 0-8.5-1"/><path d="M3 14h15M5 18h13"/></svg>';
  return g+'</svg>';
}
function setTxt(id,v){ var e=document.getElementById(id); if(e) e.textContent=v; }
function paintWeather(d, cached){
  if(!d){ setTxt("wxTemp","—"); setTxt("wxCond", navigator.onLine?"Weather unavailable":"Offline — connect for weather"); return; }
  var w = wmo(d.code);
  setTxt("wxTemp", d.t + "°F");
  setTxt("wxCond", w.label + (cached ? " · last update" : ""));
  var ic=document.getElementById("wxIcon"); if(ic) ic.innerHTML = wxGlyph(w.kind);
}
function loadWeather(){
  var city = weatherCityForToday();
  setTxt("wxCity", "· " + city.name);
  var cached=null; try{ cached=JSON.parse(lsGet("greece_wx_"+city.name)||"null"); }catch(e){}
  if(cached) paintWeather(cached, true);
  var url="https://api.open-meteo.com/v1/forecast?latitude="+city.lat+"&longitude="+city.lon+"&current_weather=true&temperature_unit=fahrenheit";
  fetch(url).then(function(r){return r.json();}).then(function(j){
    var cw = j.current_weather || (j.current ? {temperature:j.current.temperature_2m, weathercode:j.current.weather_code} : null);
    if(!cw) throw 0;
    var d={ t:Math.round(cw.temperature), code:cw.weathercode, ts:Date.now() };
    lsSet("greece_wx_"+city.name, JSON.stringify(d));
    paintWeather(d, false);
  }).catch(function(){ if(!cached) paintWeather(null, false); });
}
var RATE = null;
function convFrom(which){
  if(!RATE) return;
  var e=document.getElementById("cvEur"), u=document.getElementById("cvUsd");
  if(!e||!u) return;
  if(which==="eur"){ var v=parseFloat(e.value); u.value = isFinite(v) ? (v*RATE).toFixed(2) : ""; }
  else { var v2=parseFloat(u.value); e.value = isFinite(v2) ? (v2/RATE).toFixed(2) : ""; }
}
window.convFrom = convFrom;
function setRate(rate, date, cached){
  RATE = rate;
  var lbl=document.getElementById("cvRate");
  if(lbl) lbl.textContent = "1 € = $" + rate.toFixed(4) + " · ECB " + date + (cached ? " (cached)" : "");
  convFrom("eur");
}
function loadRate(){
  var cached=null; try{ cached=JSON.parse(lsGet("greece_rate")||"null"); }catch(e){}
  if(cached && cached.rate) setRate(cached.rate, cached.date, true);
  fetch("https://api.frankfurter.dev/v1/latest?base=EUR&symbols=USD").then(function(r){return r.json();}).then(function(j){
    var rate = j && j.rates && j.rates.USD;
    if(!rate) throw 0;
    lsSet("greece_rate", JSON.stringify({rate:rate, date:j.date}));
    setRate(rate, j.date, false);
  }).catch(function(){ if(!cached){ var lbl=document.getElementById("cvRate"); if(lbl) lbl.textContent = "Rate unavailable offline — enter values manually"; } });
}
function initInfoWidgets(){ loadWeather(); loadRate(); }

    + '<div class="herocap"><div class="hk">'+esc(p.kicker)+'</div><h1 style="font-size:30px;">'+esc(p.title)+'</h1></div></div>';
  html += '<div style="display:flex;align-items:center;gap:8px;margin:16px 24px 0;">'
    + (p.confirmed?'<span class="badge" style="padding:3px 9px;">'+I.check.replace('width="9" height="9"','width="10" height="10"')+'Confirmed</span>':'')
    + '<span class="conf">'+esc(p.conf||"")+'</span></div>';
  html += '<div class="pchips">';
  p.facts.forEach(function(f){ html += '<div class="infocell"><div class="lbl">'+esc(f[0])+'</div><div class="val">'+esc(f[1])+'</div></div>'; });
  html += '</div>';
  html += '<div class="pbox"><div class="lbl">'+esc(p.meetingLabel)+'</div><div style="font-size:14.5px;font-weight:600;color:var(--ink);margin-top:6px;">'+esc(p.meeting)+'</div><div style="font-size:13px;color:var(--muted);margin-top:3px;line-height:1.5;">'+esc(p.meetingNote)+'</div></div>';
  html += '<div class="pbox bring"><div class="lbl">What to bring</div><div style="margin-top:9px;display:flex;flex-direction:column;gap:7px;">';
  p.bring.forEach(function(b){ html += '<div class="bringitem"><span style="width:6px;height:6px;border-radius:50%;background:var(--gold-2);"></span>'+esc(b)+'</div>'; });
  html += '</div><div style="font-size:12.5px;color:var(--advisory-t);margin-top:11px;line-height:1.45;border-top:1px solid var(--advisory-bd);padding-top:10px;">'+esc(p.bringNote)+'</div></div>';
  html += '<a class="mapbtn" target="_blank" rel="noopener" href="'+mapsUrl(p.map)+'"><div class="stripes"></div><div class="lab">'+I.pinSm.replace('stroke="currentColor"','stroke="currentColor"')+' OPEN IN MAPS · '+esc(p.mapLabel)+'</div></a>';
  html += '<div class="twobtns"><a class="solid" href="'+telHref(p.phone)+'">'+I.phone.replace('width="14" height="14"','width="17" height="17"').replace('stroke="currentColor"','stroke="#fff"')+' Call guide</a>'
    + '<a class="outline" href="mailto:'+esc(p.email)+'">'+I.mail+' Email</a></div>';
  return html;
}

/* ---------- tab bar ---------- */
function renderTabs(){
  var s = state.screen;
  var itinActive = (s==="itinerary"||s==="day"||s==="place");
  function tab(scr,active,icon,label){
    return '<button class="tab'+(active?' active':'')+'" onclick="go(\''+scr+'\')">'+icon+'<span>'+label+'</span></button>';
  }
  return tab("itinerary", itinActive, I.tabItin, "Itinerary")
    + tab("today", s==="today", I.tabToday, "Today")
    + tab("bookings", s==="bookings", I.tabBook, "Bookings")
    + tab("info", s==="info", I.tabInfo, "Info");
}

/* ---------- main render ---------- */
function render(){
  var el = document.getElementById("screen");
  var s = state.screen, html="";
  if (s==="itinerary") html=renderItinerary();
  else if (s==="day") html=renderDay();
  else if (s==="today") html=renderToday();
  else if (s==="bookings") html=renderBookings();
  else if (s==="info") html=renderInfo();
  else if (s==="place") html=renderPlace();
  else html=renderItinerary();
  el.innerHTML = html;
  document.getElementById("tabbar").innerHTML = renderTabs();
  updateToggle();
  if (s === "info") initInfoWidgets();
  // meta theme-color follows mode
  var mc=document.querySelector('meta[name="theme-color"]'); if(mc) mc.setAttribute("content", theme==="dark"?"#0A1B28":"#0F3450");
}

render();
